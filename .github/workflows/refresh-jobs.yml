name: Keep CareerAI jobs fresh

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Wake API and trigger scheduled refresh
        env:
          CAREERAI_API_URL: ${{ secrets.CAREERAI_API_URL }}
        run: |
          if [ -z "$CAREERAI_API_URL" ]; then
            echo "Add CAREERAI_API_URL in GitHub repository secrets."
            exit 1
          fi
          curl --fail --retry 3 --retry-delay 10 --max-time 120 \
            "${CAREERAI_API_URL%/}/api/health"
