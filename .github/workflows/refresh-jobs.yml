name: Keep CareerAI jobs fresh

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Wake API and trigger scheduled refresh
        env:
          CAREERAI_API_URL: ${{ secrets.CAREERAI_API_URL || vars.CAREERAI_API_URL || 'https://careerai-api-production.up.railway.app' }}
        run: |
          set -u

          API_URL="${CAREERAI_API_URL:-https://careerai-api-production.up.railway.app}"
          API_URL="${API_URL%/}"

          if [ -z "$API_URL" ]; then
            echo "::warning::CAREERAI_API_URL is empty, so the job refresh wakeup was skipped."
            exit 0
          fi

          case "$API_URL" in
            */api) HEALTH_URL="${API_URL}/health" ;;
            *) HEALTH_URL="${API_URL}/api/health" ;;
          esac

          echo "Waking CareerAI API: $HEALTH_URL"

          if curl --fail-with-body --location --retry 6 --retry-all-errors --retry-delay 15 --max-time 180 "$HEALTH_URL"; then
            echo "CareerAI API wakeup succeeded. The backend job scheduler will keep refreshing the cached feed."
          else
            echo "::warning::CareerAI API wakeup failed. This can happen if Railway is starting slowly or the URL changed."
            exit 0
          fi
