services:
  - type: web
    name: careerai-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: MONGODB_USE_MOCK
        value: "false"
      - key: MONGODB_DATABASE
        value: careerai
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_STANDARD_HOSTS
        sync: false
      - key: MONGODB_REPLICA_SET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: GITHUB_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
